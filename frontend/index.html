<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secure Task Manager</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#2563eb,#7c3aed);
      padding:30px;
    }

    .container{
      width:100%;
      max-width:900px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:25px;
    }

    .card{
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(15px);
      border:1px solid rgba(255,255,255,0.2);
      border-radius:20px;
      padding:30px;
      color:white;
      box-shadow:0 8px 25px rgba(0,0,0,0.2);
    }

    h2{
      margin-bottom:20px;
      font-size:28px;
      font-weight:600;
    }

    h3{
      margin-bottom:15px;
      font-weight:500;
    }

    input, textarea{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:none;
      border-radius:10px;
      outline:none;
      background:rgba(255,255,255,0.15);
      color:white;
      font-size:14px;
    }

    input::placeholder,
    textarea::placeholder{
      color:#e5e7eb;
    }

    textarea{
      resize:none;
      height:100px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:white;
      color:#2563eb;
      font-weight:600;
      cursor:pointer;
      margin-top:12px;
      transition:0.3s;
    }

    button:hover{
      transform:translateY(-2px);
      background:#f3f4f6;
    }

    .message{
      margin-top:15px;
      text-align:center;
      font-size:14px;
      color:#d1fae5;
    }

    .task-list{
      margin-top:20px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .task-item{
      background:rgba(255,255,255,0.12);
      padding:15px;
      border-radius:12px;
    }

    .task-item h4{
      margin-bottom:5px;
      color:white;
    }

    .task-item p{
      font-size:14px;
      color:#e5e7eb;
    }

    @media(max-width:768px){

      .container{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>
<body>

<div class="container">

  <!-- AUTH CARD -->
  <div class="card">

    <h2>Secure Task API</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="registerUser()">Register</button>

    <button onclick="loginUser()">Login</button>

    <div class="message" id="message"></div>

  </div>

  <!-- TASK CARD -->
  <div class="card">

    <h2>Task Manager</h2>

    <input type="text" id="title" placeholder="Task Title">

    <textarea id="description" placeholder="Task Description"></textarea>

    <button onclick="createTask()">Create Task</button>

    <button onclick="getTasks()">Load Tasks</button>

    <div class="task-list" id="taskList"></div>

  </div>

</div>

<script>

const API_URL = 'https://secure-task-api.onrender.com';

let token = '';

async function registerUser(){

  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const message = document.getElementById('message');

  // Email validation
const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

if(!email.match(emailPattern)){

    message.innerText = 'Please enter a valid email address';

    return;
}

  // Password validation
  if(password.length < 6){

    message.innerText = 'Password must be at least 6 characters';

    return;
  }

  const response = await fetch(`${API_URL}/api/auth/register`,{
    method:'POST',
    headers:{
      'Content-Type':'application/json'
    },
    body:JSON.stringify({name,email,password})
  });

  const data = await response.json();

  message.innerText = data.message;

}


async function loginUser(){

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const response = await fetch(`${API_URL}/api/auth/login`,{
    method:'POST',
    headers:{
      'Content-Type':'application/json'
    },
    body:JSON.stringify({email,password})
  });

  const data = await response.json();

  token = data.token;

  document.getElementById('message').innerText = data.message;

}

async function createTask(){

  const title = document.getElementById('title').value;
  const description = document.getElementById('description').value;

  await fetch(`${API_URL}/api/tasks`,{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':`Bearer ${token}`
    },
    body:JSON.stringify({title,description})
  });

  document.getElementById('message').innerText = 'Task Created Successfully';

}

async function getTasks(){

  const response = await fetch(`${API_URL}/api/tasks`,{
    method:'GET',
    headers:{
      'Authorization':`Bearer ${token}`
    }
  });

  const tasks = await response.json();

  const taskList = document.getElementById('taskList');

  taskList.innerHTML = '';

  tasks.forEach(task=>{

    const div = document.createElement('div');

    div.classList.add('task-item');

    div.innerHTML = `
      <h4>${task.title}</h4>
      <p>${task.description}</p>
    `;

    taskList.appendChild(div);

  });

}

</script>

</body>
</html>
