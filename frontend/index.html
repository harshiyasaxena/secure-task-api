<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Task Manager</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, #7c3aed 0%, transparent 30%),
        radial-gradient(circle at bottom right, #2563eb 0%, transparent 30%),
        linear-gradient(135deg, #0f172a, #1e293b, #111827);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
      padding: 20px;
    }

    body::before,
    body::after {
      content: '';
      position: absolute;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: float 8s ease-in-out infinite;
    }

    body::before {
      background: #7c3aed;
      top: -100px;
      left: -100px;
    }

    body::after {
      background: #2563eb;
      bottom: -100px;
      right: -100px;
      animation-delay: 2s;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(20px);
      }

      100% {
        transform: translateY(0px);
      }
    }

    .auth-container,
    .dashboard {
      width: 100%;
      max-width: 430px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(22px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 30px;
      padding: 40px;
      color: white;
      box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.4),
        inset 0 1px 1px rgba(255, 255, 255, 0.15);
      position: relative;
      z-index: 1;
      animation: fadeIn 0.7s ease;
    }

    .dashboard {
      display: none;
      max-width: 1200px;
      width: 100%;
    }

    .dashboard-layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 28px;
      align-items: start;
      width: 100%;
    }

    .task-panel,
    .tasks-display {
      min-height: 500px;
      max-height: 650px;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: #8b5cf6 rgba(255, 255, 255, 0.08);
    }

    .tasks-display::-webkit-scrollbar {
      width: 8px;
    }

    .tasks-display::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
    }

    .tasks-display::-webkit-scrollbar-thumb {
      background: linear-gradient(#8b5cf6, #2563eb);
      border-radius: 20px;
    }

    .tasks-display::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(#7c3aed, #1d4ed8);
    }

    .tasks-display {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 24px;
      backdrop-filter: blur(12px);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0px);
      }
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(to right, #ffffff, #c4b5fd, #93c5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 30px;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.6;
    }

    .tabs {
      position: relative;
      display: flex;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      padding: 6px;
      margin-bottom: 30px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      box-shadow:
        inset 0 1px 2px rgba(255, 255, 255, 0.08),
        0 4px 20px rgba(0, 0, 0, 0.15);
    }

    .tabs::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background: linear-gradient(135deg,
          rgba(255, 255, 255, 0.06),
          rgba(255, 255, 255, 0.02));
      pointer-events: none;
    }

    .tab-btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: transparent;
      color: #cbd5e1;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.35s ease;
      font-size: 15px;
      position: relative;
      z-index: 2;
      letter-spacing: 0.3px;
    }

    .tab-btn:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .active-tab {
      background: linear-gradient(135deg, #8b5cf6, #2563eb);
      color: white;
      box-shadow:
        0 6px 25px rgba(124, 58, 237, 0.45),
        inset 0 1px 1px rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
    }

    .active-tab::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: linear-gradient(to right,
          rgba(255, 255, 255, 0.15),
          transparent);
      pointer-events: none;
    }

    .form-section {
      display: none;
    }

    .active-form {
      display: block;
      animation: fadeIn 0.5s ease;
    }

    input,
    textarea {
      width: 100%;
      padding: 15px 18px;
      margin: 12px 0;
      border: none;
      border-radius: 16px;
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-size: 14px;
      border: 1px solid transparent;
      transition: 0.3s ease;
    }

    input:focus,
    textarea:focus {
      border: 1px solid #8b5cf6;
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
      transform: scale(1.01);
    }

    input::placeholder,
    textarea::placeholder {
      color: #cbd5e1;
    }

    textarea {
      resize: none;
      height: 110px;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      margin-top: 14px;
      transition: 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    button:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 10px 25px rgba(124, 58, 237, 0.4);
    }

    button::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: -100%;
      background: rgba(255, 255, 255, 0.15);
      transition: 0.5s;
    }

    button:hover::before {
      left: 100%;
    }

    .logout-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      margin-bottom: 22px;
    }

    .logout-btn:hover {
      box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4);
    }

    .message {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: #bfdbfe;
      font-weight: 500;
      min-height: 20px;
    }

    .toast {
      position: fixed;
      top: 30px;
      right: 30px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      padding: 16px 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.35);
      font-weight: 600;
      z-index: 9999;
      opacity: 0;
      transform: translateY(-20px);
      pointer-events: none;
      transition: 0.4s ease;
    }

    .show-toast {
      opacity: 1;
      transform: translateY(0px);
    }

    .task-list {
      padding-right: 6px;
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .task-item {
      background: rgba(255, 255, 255, 0.08);
      padding: 22px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .task-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(to right, #7c3aed, #2563eb);
    }

    .task-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .task-item h3 {
      margin-bottom: 8px;
      font-size: 18px;
      color: white;
    }

    .task-item p {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.6;
    }

    @media(max-width:1100px) {

      body {
        align-items: flex-start;
        padding-top: 30px;
        padding-bottom: 30px;
      }

      .dashboard {
        max-width: 100%;
      }

      .dashboard-layout {
        grid-template-columns: 1fr;
      }

      .task-panel,
      .tasks-display {
        width: 100%;
      }

      .tasks-display {
        min-height: 350px;
        max-height: 500px;
      }



      @media(max-width:1024px) {

        .dashboard {
          max-width: 95%;
        }

        .task-list {
          grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }

      }

      @media(max-width:768px) {

        html,
        body {
          overflow-y: auto;
        }

        body {
          padding: 12px;
          align-items: flex-start;
        }

        .auth-container,
        .dashboard {
          width: 100%;
          padding: 24px 18px;
          border-radius: 24px;
        }

        .dashboard-layout {
          display: flex;
          flex-direction: column;
          gap: 20px;
        }

        h1 {
          font-size: 28px;
        }

        .subtitle {
          font-size: 13px;
        }

        input,
        textarea,
        button {
          font-size: 14px;
          padding: 14px;
        }

        .task-panel,
        .tasks-display {
          padding: 18px;
          border-radius: 20px;
        }

        .tasks-display {
          max-height: none;
          overflow-y: visible;
        }

        .task-list {
          grid-template-columns: 1fr;
        }

        .task-item {
          padding: 18px;
        }

      }

      @media(max-width:480px) {

        body {
          padding: 10px;
        }

        .auth-container,
        .dashboard {
          padding: 22px 18px;
          border-radius: 20px;
        }

        h1 {
          font-size: 24px;
        }

        .subtitle {
          font-size: 12px;
          line-height: 1.5;
        }

        .tab-btn {
          padding: 12px;
          font-size: 13px;
        }

        input,
        textarea {
          padding: 13px 14px;
          border-radius: 14px;
        }

        button {
          padding: 13px;
          border-radius: 14px;
          font-size: 14px;
        }

        .task-item h3 {
          font-size: 16px;
        }

        .task-item p {
          font-size: 13px;
        }

      }

      h1 {
        font-size: 28px;
      }

      .task-list {
        grid-template-columns: 1fr;
      }

    }
  </style>
</head>

<body>

  <!-- AUTH SECTION -->
  <div class="auth-container" id="authContainer">

    <h1>Secure Task Manager</h1>

    <p class="subtitle">JWT Authentication & Task Management System</p>

    <div class="tabs">
      <button class="tab-btn active-tab" id="loginTab" onclick="showLogin()">Login</button>
      <button class="tab-btn" id="registerTab" onclick="showRegister()">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="form-section active-form" id="loginForm">

      <input type="email" id="loginEmail" placeholder="Enter Email">

      <input type="password" id="loginPassword" placeholder="Enter Password">

      <button onclick="loginUser()">Login</button>

    </div>

    <!-- REGISTER FORM -->
    <div class="form-section" id="registerForm">

      <input type="text" id="registerName" placeholder="Enter Name">

      <input type="email" id="registerEmail" placeholder="Enter Email">

      <input type="password" id="registerPassword" placeholder="Enter Password">

      <button onclick="registerUser()">Create Account</button>

    </div>

    <div class="message" id="message"></div>

  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">

    <button class="logout-btn" onclick="logoutUser()">Logout</button>

    <h1>Task Dashboard</h1>

    <p class="subtitle">Manage your tasks securely</p>

    <div class="dashboard-layout">

      <div class="task-panel">

        <input type="text" id="title" placeholder="Task Title">

        <textarea id="description" placeholder="Task Description"></textarea>

        <button onclick="createTask()">Create Task</button>

        <button onclick="getTasks()">Load Tasks</button>

      </div>

      <div class="tasks-display">

        <h2 style="margin-bottom:20px; color:white;">Your Tasks</h2>

        <div class="task-list" id="taskList"></div>

      </div>

    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>

    const API_URL = 'https://secure-task-api-8q5m.onrender.com';

    function showRegister() {

      document.getElementById('registerForm').classList.add('active-form');
      document.getElementById('loginForm').classList.remove('active-form');

      document.getElementById('registerTab').classList.add('active-tab');
      document.getElementById('loginTab').classList.remove('active-tab');

    }

    function showLogin() {

      document.getElementById('loginForm').classList.add('active-form');
      document.getElementById('registerForm').classList.remove('active-form');

      document.getElementById('loginTab').classList.add('active-tab');
      document.getElementById('registerTab').classList.remove('active-tab');

    }

    async function registerUser() {

      const name = document.getElementById('registerName').value;
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;

      const message = document.getElementById('message');

      const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

      if (!email.match(emailPattern)) {

        message.innerText = 'Please enter valid email';

        return;

      }

      if (password.length < 6) {

        message.innerText = 'Password must be at least 6 characters';

        return;

      }

      const response = await fetch(`${API_URL}/api/auth/register`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name, email, password })
      });

      const data = await response.json();

      message.innerText = data.message;

      showLogin();

    }

    async function loginUser() {

      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      const response = await fetch(`${API_URL}/api/auth/login`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (data.token) {

        localStorage.setItem('token', data.token);

        document.getElementById('authContainer').style.display = 'none';

        document.getElementById('dashboard').style.display = 'block';

        getTasks();

      }

      document.getElementById('message').innerText = data.message;

    }

    async function createTask() {

      const token = localStorage.getItem('token');

      const title = document.getElementById('title').value;
      const description = document.getElementById('description').value;

      await fetch(`${API_URL}/api/tasks`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ title, description })
      });

      document.getElementById('title').value = '';
      document.getElementById('description').value = '';

      showToast('Task Created Successfully');

      getTasks();

    }

    async function getTasks() {

      const token = localStorage.getItem('token');

      const response = await fetch(`${API_URL}/api/tasks`, {
        method: 'GET',
        headers: {
          'Authorization': `Bearer ${token}`
        }
      });

      const tasks = await response.json();

      const taskList = document.getElementById('taskList');

      taskList.innerHTML = '';

      tasks.forEach(task => {

        const div = document.createElement('div');

        div.classList.add('task-item');

        div.innerHTML = `
  <h3>${task.title}</h3>
  <p>${task.description}</p>
`;

        taskList.appendChild(div);

      });

    }

    
    function showToast(message) {

      const toast = document.getElementById('toast');

      toast.innerText = message;

      toast.classList.add('show-toast');

      setTimeout(() => {

        toast.classList.remove('show-toast');

      }, 3000);

    }

    function logoutUser() {

      localStorage.removeItem('token');

      document.getElementById('dashboard').style.display = 'none';

      document.getElementById('authContainer').style.display = 'block';

      document.getElementById('loginEmail').value = '';
      document.getElementById('loginPassword').value = '';

      document.getElementById('registerName').value = '';
      document.getElementById('registerEmail').value = '';
      document.getElementById('registerPassword').value = '';

      document.getElementById('title').value = '';
      document.getElementById('description').value = '';

      document.getElementById('taskList').innerHTML = '';

      document.getElementById('message').innerText = '';

    }

  </script>

</body>

</html>
